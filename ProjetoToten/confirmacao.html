<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem - Hamburgueria | Confirmação</title>

    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>

        <section class="banner">

            <img src="img/logosemfundo.png" alt="Logo Hamburgueria" class="logo-final">

            <h1>
                Confirme seu
                <span>Pedido</span>
            </h1>

            <p>
                Confira os itens escolhidos antes de finalizar.
            </p>

        </section>

        <section class="white-itens">

            <div class="resumo-card">

                <h2>Resumo do Pedido</h2>

                <div class="item-resumo">

                    <strong> Hambúrguer:</strong>

                    <p id="hamburguerEscolhido">
                        Nenhum hambúrguer selecionado.
                    </p>

                </div>

                <div class="item-resumo">

                    <strong> Extra:</strong>

                    <p id="extraEscolhido">
                        Nenhum extra selecionado.
                    </p>

                </div>

                <div class="item-resumo">

                    <strong> Bebida:</strong>

                    <p id="bebidaEscolhida">
                        Nenhuma bebida selecionada.
                    </p>

                </div>

                <button id="btnConfirmar">
                    Confirmar Pedido
                </button>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
