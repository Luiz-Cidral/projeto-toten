<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Totem - Hamburgueria</title>

    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <nav>

            <ul>

                <li class="logo">

                    <img src="img/logosemfundo.png" alt="Logo Hamburgueria">

                </li>

                <li class="atual">
                    <a href="index.html">Hambúrguer</a>
                </li>

                <li>
                    <a href="extra.html">Extra</a>
                </li>

                <li >

                </li>

                <li>
                    <a href="resumo.html">Resumo</a>

        </nav>

    </header>

    <main>

        <section class="banner">

            <h1>
                Escolha seu

            <p>Selecione uma opção para iniciar seu pedido.</p>

        </section>

        <section class="white-itens">

            <ul>

                    <img src="img/x-burguer.png" alt="X-Burger">

                    <button onclick="escolherHamburguer('X-Burger')">

                    </button>

                </li>

                <li>

                    <img src="img/x-baicon.png" alt="X-Baicon">

                    <p>X-Bacon</p>

                    <button onclick="escolherHamburguer('X-Baicon')">
                        Escolher
                    </button>

                </li>

                <li>

                    <img src="img/x-calabresa.png" alt="X-Calabresa">

                    <p>X-Calabesa</p>

                    <button onclick="escolherHamburguer('X-Calabresa')">

                    </button>
